name: Docker and infrastructure

on:
  pull_request:
    paths:
      - .github/workflows/docker.yml
      - .node-version
      - compose.yaml
      - nx.json
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/api/**
      - apps/worker/**
      - apps/web/**
      - apps/marketing/**
      - apps/admin/**
      - apps/compute/**
      - packages/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker.yml
      - .node-version
      - compose.yaml
      - nx.json
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/api/**
      - apps/worker/**
      - apps/web/**
      - apps/marketing/**
      - apps/admin/**
      - apps/compute/**
      - packages/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  infrastructure:
    name: Validate Compose services
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Start PostgreSQL and Redis
        run: docker compose up --detach --wait --wait-timeout 120 postgres redis

      - name: Verify PostgreSQL readiness
        run: docker compose exec -T postgres sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

      - name: Verify Redis readiness
        shell: bash
        run: test "$(docker compose exec -T redis redis-cli ping | tr -d '\r')" = 'PONG'

      - name: Stop infrastructure
        if: always()
        run: docker compose down --volumes --remove-orphans

  images:
    name: Build and validate images
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CI: 'true'
      NX_DAEMON: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version

      - name: Activate repository pnpm version
        shell: bash
        run: |
          package_manager=$(node -p "require('./package.json').packageManager")
          corepack enable
          corepack install --global "$package_manager"

      - name: Locate pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-11.10.0-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-11.10.0-

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare API image context
        run: pnpm nx run @saas-template/api:prune --outputStyle=static

      - name: Prepare worker image context
        run: pnpm nx run @saas-template/worker:prune --outputStyle=static

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          load: true
          push: false
          tags: saas-template-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: apps/worker
          file: apps/worker/Dockerfile
          load: true
          push: false
          tags: saas-template-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          push: false
          tags: saas-template-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build marketing image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/marketing/Dockerfile
          load: true
          push: false
          tags: saas-template-marketing:ci
          cache-from: type=gha,scope=marketing
          cache-to: type=gha,mode=max,scope=marketing

      - name: Build admin image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          load: true
          push: false
          tags: saas-template-admin:ci
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build compute image
        uses: docker/build-push-action@v7
        with:
          context: apps/compute
          file: apps/compute/Dockerfile
          load: true
          push: false
          tags: saas-template-compute:ci
          cache-from: type=gha,scope=compute
          cache-to: type=gha,mode=max,scope=compute

      - name: Verify non-root runtime users
        shell: bash
        run: |
          images=(
            saas-template-api:ci
            saas-template-worker:ci
            saas-template-web:ci
            saas-template-marketing:ci
            saas-template-admin:ci
            saas-template-compute:ci
          )
          for image in "${images[@]}"; do
            user=$(docker image inspect "$image" --format '{{.Config.User}}')
            echo "$image runtime user: $user"
            if [[ -z "$user" || "$user" == '0' || "$user" == 'root' || "$user" == 0:* ]]; then
              echo "$image is configured to run as root" >&2
              exit 1
            fi
          done

      - name: Verify worker runtime contract
        shell: bash
        run: |
          test "$(docker image inspect saas-template-worker:ci --format '{{json .Config.Cmd}}')" = '["node","main.js"]'
          test "$(docker image inspect saas-template-worker:ci --format '{{json .Config.ExposedPorts}}')" = 'null'
          test "$(docker image inspect saas-template-worker:ci --format '{{json .Config.Healthcheck}}')" = 'null'

      - name: Start API image
        run: docker run --detach --name api-ci --publish 127.0.0.1:13000:3000 saas-template-api:ci

      - name: Wait for API health check
        shell: bash
        run: |
          for attempt in {1..60}; do
            status=$(docker inspect api-ci --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')
            if [[ "$status" == 'healthy' ]]; then
              exit 0
            fi
            if [[ "$status" == 'unhealthy' ]]; then
              docker logs api-ci
              exit 1
            fi
            sleep 2
          done
          docker logs api-ci
          exit 1

      - name: Verify API liveness endpoint
        run: curl --fail --silent --show-error http://127.0.0.1:13000/health | grep --fixed-strings '"status":"ok"'

      - name: Start Next.js images
        run: |
          docker run --detach --name web-ci --publish 127.0.0.1:13001:3000 saas-template-web:ci
          docker run --detach --name marketing-ci --publish 127.0.0.1:13002:3000 saas-template-marketing:ci
          docker run --detach --name admin-ci --publish 127.0.0.1:13003:3000 saas-template-admin:ci

      - name: Wait for Next.js health checks
        shell: bash
        run: |
          for container in web-ci marketing-ci admin-ci; do
            for attempt in {1..60}; do
              state=$(docker inspect "$container" --format '{{.State.Status}}')
              status=$(docker inspect "$container" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')
              if [[ "$status" == 'healthy' ]]; then
                break
              fi
              if [[ "$state" == 'exited' || "$state" == 'dead' || "$status" == 'unhealthy' ]]; then
                docker logs "$container"
                exit 1
              fi
              sleep 2
            done
            if [[ "$status" != 'healthy' ]]; then
              docker logs "$container"
              exit 1
            fi
          done

      - name: Verify Next.js root pages
        run: |
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:13001/
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:13002/
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:13003/

      - name: Start compute image
        run: docker run --detach --name compute-ci --publish 127.0.0.1:18000:8000 saas-template-compute:ci

      - name: Wait for compute health check
        shell: bash
        run: |
          for attempt in {1..60}; do
            status=$(docker inspect compute-ci --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')
            if [[ "$status" == 'healthy' ]]; then
              exit 0
            fi
            if [[ "$status" == 'unhealthy' ]]; then
              docker logs compute-ci
              exit 1
            fi
            sleep 2
          done
          docker logs compute-ci
          exit 1

      - name: Verify compute endpoints
        run: |
          curl --fail --silent --show-error http://127.0.0.1:18000/health | grep --fixed-strings '"status":"healthy"'
          curl --fail --silent --show-error http://127.0.0.1:18000/ready | grep --fixed-strings '"status":"ready"'

      - name: Stop test containers
        if: always()
        run: docker rm --force api-ci web-ci marketing-ci admin-ci compute-ci 2>/dev/null || true
